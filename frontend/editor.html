<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRDT Notes</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f4ef;
        color: #181a1f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      header,
      footer {
        padding: 14px 18px;
        background: #ffffff;
        border-bottom: 1px solid #d8d4cc;
      }

      footer {
        border-top: 1px solid #d8d4cc;
        border-bottom: 0;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        font-size: 13px;
        color: #4c535c;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: #4c535c;
        white-space: nowrap;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #c43d3d;
      }

      .dot.open {
        background: #228a5a;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        min-height: 0;
      }

      textarea {
        width: 100%;
        height: 100%;
        min-height: 480px;
        resize: none;
        border: 0;
        outline: 0;
        padding: 28px;
        font: 18px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #fffdf8;
        color: #181a1f;
      }

      aside {
        border-left: 1px solid #d8d4cc;
        background: #fdfbf6;
        padding: 16px;
        overflow: auto;
      }

      .panel-title {
        margin: 0 0 10px;
        font-size: 13px;
        text-transform: uppercase;
        color: #626a73;
      }

      pre {
        margin: 0;
        padding: 12px;
        min-height: 220px;
        max-height: 45vh;
        overflow: auto;
        border: 1px solid #d8d4cc;
        background: #ffffff;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }

      button {
        border: 1px solid #b9b2a6;
        background: #ffffff;
        color: #181a1f;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: #f1ece3;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

      @media (max-width: 820px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        aside {
          border-left: 0;
          border-top: 1px solid #d8d4cc;
        }

        textarea {
          min-height: 56vh;
          padding: 18px;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="topbar">
          <h1>CRDT Notes</h1>
          <div class="status">
            <span class="dot" id="dot"></span>
            <span id="status">connecting</span>
          </div>
        </div>
      </header>

      <section class="workspace">
        <label for="editor" class="sr-only">Note editor</label>
        <textarea id="editor" spellcheck="false" autofocus></textarea>
        <aside>
          <div class="actions">
            <button id="clear">Clear</button>
          </div>
          <h2 class="panel-title">RGA operation columns</h2>
          <pre id="ops"></pre>
        </aside>
      </section>

      <footer>
        <span id="replica"></span>
        <span id="counter"></span>
        <span id="clients"></span>
      </footer>
    </main>

    <script>
      class RgaText {
        constructor() {
          this.elements = new Map();
          this.deletes = new Map();
          this.deleteTargets = new Set();
        }

        apply(op) {
          if (op.type === "insert") {
            if (!this.elements.has(op.id)) {
              this.elements.set(op.id, {
                id: op.id,
                previous: op.previous || null,
                value: op.value,
                removed: this.deleteTargets.has(op.id),
              });
            }
          } else if (op.type === "delete") {
            this.deletes.set(op.id, { id: op.id, target: op.target });
            this.deleteTargets.add(op.target);
            const element = this.elements.get(op.target);
            if (element) element.removed = true;
          }
        }

        visibleElements() {
          const children = new Map();
          for (const element of this.elements.values()) {
            const key = element.previous || "ROOT";
            if (!children.has(key)) children.set(key, []);
            children.get(key).push(element);
          }

          for (const siblings of children.values()) {
            siblings.sort((left, right) => compareOpId(right.id, left.id));
          }

          const result = [];
          const walk = (previous) => {
            const siblings = children.get(previous || "ROOT") || [];
            for (const element of siblings) {
              if (!element.removed) result.push(element);
              walk(element.id);
            }
          };
          walk(null);
          return result;
        }

        text() {
          return this.visibleElements()
            .map((element) => element.value)
            .join("");
        }

        predecessor(index) {
          const visible = this.visibleElements();
          if (index <= 0 || visible.length === 0) return null;
          return visible[Math.min(index, visible.length) - 1].id;
        }

        idAt(index) {
          return this.visibleElements()[index]?.id || null;
        }

        columns() {
          const rows = ["type,op_id,ref_id,target_id,char,removed"];
          const elements = Array.from(this.elements.values()).sort((a, b) =>
            compareOpId(a.id, b.id)
          );
          for (const element of elements) {
            const value = csvField(element.value);
            rows.push(
              `insert,${csvField(element.id)},${csvField(
                element.previous || "ROOT"
              )},,${value},${element.removed}`
            );
          }
          const deletes = Array.from(this.deletes.values()).sort((a, b) =>
            compareOpId(a.id, b.id)
          );
          for (const deletion of deletes) {
            rows.push(
              `delete,${csvField(deletion.id)},,${csvField(
                deletion.target
              )},,true`
            );
          }
          return rows.join("\n");
        }
      }

      function csvField(value) {
        const text = String(value ?? "");
        if (!/[",\r\n]/.test(text)) return text;
        return `"${text.replaceAll('"', '""')}"`;
      }

      function parseOpId(id) {
        const at = id.indexOf("@");
        return {
          counter: Number(id.slice(0, at)),
          replica: id.slice(at + 1),
        };
      }

      function compareOpId(left, right) {
        const a = parseOpId(left);
        const b = parseOpId(right);
        if (a.counter !== b.counter) return a.counter - b.counter;
        return a.replica.localeCompare(b.replica);
      }

      const replicaId =
        sessionStorage.getItem("crdt-replica-id") ||
        crypto.randomUUID().slice(0, 8);
      sessionStorage.setItem("crdt-replica-id", replicaId);

      const urlParams = new URLSearchParams(location.search);
      const documentId = urlParams.get("document_id") || urlParams.get("doc") || "default";
      const wsPort = urlParams.get("ws_port") || "3001";
      const authToken = urlParams.get("token") || "";
      let counter = 0;
      let localText = "";
      let applyingRemote = false;
      let batchingLocalOps = false;
      let reconnectDelayMs = 500;
      let reconnectTimer = null;
      let ws = null;
      const seenOps = new Set();
      const pendingOps = new Map();
      const rga = new RgaText();
      const editor = document.getElementById("editor");
      const ops = document.getElementById("ops");
      const dot = document.getElementById("dot");
      const status = document.getElementById("status");
      const replica = document.getElementById("replica");
      const counterEl = document.getElementById("counter");
      const clientsEl = document.getElementById("clients");

      function websocketUrl() {
        const url = new URL("/", location.href);
        url.protocol = location.protocol === "https:" ? "wss:" : "ws:";
        url.hostname = location.hostname;
        if (wsPort === "same") {
          url.port = location.port;
        } else {
          url.port = wsPort;
        }
        url.searchParams.set("document_id", documentId);
        if (authToken) url.searchParams.set("token", authToken);
        return url.toString();
      }

      function nextId() {
        counter += 1;
        return `${counter}@${replicaId}`;
      }

      function observe(id) {
        const parsed = parseOpId(id);
        if (Number.isFinite(parsed.counter)) {
          counter = Math.max(counter, parsed.counter);
        }
      }

      function applyAndRender(op) {
        if (seenOps.has(op.id)) return;
        seenOps.add(op.id);
        observe(op.id);
        rga.apply(op);
        if (!batchingLocalOps) render();
      }

      function send(op) {
        applyAndRender(op);
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "op", document_id: documentId, op }));
        } else {
          pendingOps.set(op.id, op);
        }
      }

      function flushPendingOps() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        for (const op of pendingOps.values()) {
          ws.send(JSON.stringify({ type: "op", document_id: documentId, op }));
        }
        pendingOps.clear();
      }

      function requestSync() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(
          JSON.stringify({
            type: "sync-request",
            document_id: documentId,
            known_ids: Array.from(seenOps),
          })
        );
      }

      function render() {
        const text = rga.text();
        if (editor.value !== text) {
          const caret = editor.selectionStart;
          applyingRemote = true;
          editor.value = text;
          editor.selectionStart = editor.selectionEnd = Math.min(caret, text.length);
          applyingRemote = false;
        }
        localText = text;
        ops.textContent = rga.columns();
        replica.textContent = `document: ${documentId} | replica: ${replicaId}`;
        counterEl.textContent = `lamport: ${counter}`;
      }

      function lcsMatches(previous, next) {
        const rows = previous.length + 1;
        const cols = next.length + 1;
        const table = Array.from({ length: rows }, () => Array(cols).fill(0));

        for (let i = previous.length - 1; i >= 0; i--) {
          for (let j = next.length - 1; j >= 0; j--) {
            if (previous[i] === next[j]) {
              table[i][j] = table[i + 1][j + 1] + 1;
            } else {
              table[i][j] = Math.max(table[i + 1][j], table[i][j + 1]);
            }
          }
        }

        const matches = [];
        let i = 0;
        let j = 0;
        while (i < previous.length && j < next.length) {
          if (previous[i] === next[j]) {
            matches.push({ oldIndex: i, newIndex: j });
            i++;
            j++;
          } else if (table[i + 1][j] >= table[i][j + 1]) {
            i++;
          } else {
            j++;
          }
        }

        return matches;
      }

      function planTextOperations(previous, next) {
        const visibleBefore = rga.visibleElements();
        const matches = lcsMatches(previous, next);
        const keptOldIndexes = new Set(matches.map((match) => match.oldIndex));
        const oldIndexByNewIndex = new Map(
          matches.map((match) => [match.newIndex, match.oldIndex])
        );
        const planned = [];

        for (let oldIndex = 0; oldIndex < visibleBefore.length; oldIndex++) {
          if (!keptOldIndexes.has(oldIndex)) {
            planned.push({
              type: "delete",
              id: nextId(),
              target: visibleBefore[oldIndex].id,
            });
          }
        }

        let previousId = null;
        for (let newIndex = 0; newIndex < next.length; newIndex++) {
          const keptOldIndex = oldIndexByNewIndex.get(newIndex);
          if (keptOldIndex !== undefined) {
            previousId = visibleBefore[keptOldIndex].id;
            continue;
          }

          const id = nextId();
          planned.push({
            type: "insert",
            id,
            previous: previousId,
            value: next[newIndex],
          });
          previousId = id;
        }

        return planned;
      }

      function diffAndSend(previous, next, selectionStart) {
        const planned = planTextOperations(previous, next);
        batchingLocalOps = true;
        for (const op of planned) send(op);
        batchingLocalOps = false;
        render();
        editor.selectionStart = editor.selectionEnd = selectionStart;
      }

      editor.addEventListener("input", () => {
        if (applyingRemote) return;
        diffAndSend(localText, editor.value, editor.selectionStart);
      });

      document.getElementById("clear").onclick = () => {
        const count = rga.visibleElements().length;
        for (let i = 0; i < count; i++) {
          const target = rga.idAt(0);
          if (target) send({ type: "delete", id: nextId(), target });
        }
      };

      function scheduleReconnect() {
        if (reconnectTimer) return;
        const delay = reconnectDelayMs;
        reconnectDelayMs = Math.min(reconnectDelayMs * 2, 8000);
        status.textContent = `reconnecting in ${Math.round(delay / 1000)}s`;
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connectWebSocket();
        }, delay);
      }

      function connectWebSocket() {
        if (
          ws &&
          (ws.readyState === WebSocket.OPEN ||
            ws.readyState === WebSocket.CONNECTING)
        ) {
          return;
        }

        status.textContent = "connecting";
        ws = new WebSocket(websocketUrl());

        ws.onopen = () => {
          reconnectDelayMs = 500;
          dot.classList.add("open");
          status.textContent = "connected";
          flushPendingOps();
          requestSync();
        };

        ws.onclose = () => {
          dot.classList.remove("open");
          scheduleReconnect();
        };

        ws.onerror = () => {
          dot.classList.remove("open");
          status.textContent = "error";
        };

        ws.onmessage = (event) => {
          let message;
          try {
            message = JSON.parse(event.data);
          } catch {
            return;
          }
          if (message.type === "sync") {
            if (message.document_id !== documentId) return;
            for (const op of message.ops) applyAndRender(op);
            if (message.clients) clientsEl.textContent = `clients: ${message.clients}`;
          } else if (message.type === "op") {
            if (message.document_id !== documentId) return;
            applyAndRender(message.op);
          } else if (message.type === "error") {
            status.textContent = message.message;
          }
        };
      }

      setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          flushPendingOps();
          requestSync();
        }
      }, 3000);

      connectWebSocket();
      render();
    </script>
  </body>
</html>
